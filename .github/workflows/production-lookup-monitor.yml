name: Production lookup monitor

on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: production-lookup-monitor
  cancel-in-progress: false

jobs:
  monitor:
    name: Check production lookup readiness
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run POI autocomplete budget guard
        run: npm run test:poi-autocomplete-budget

      - name: Run architecture and documentation guards
        run: |
          npm run check:architecture
          npm run check:docs

      - name: Run production lookup monitor
        if: github.event_name != 'pull_request'
        run: npm run check:production-lookup-monitor -- --api-base https://fuel-path.vercel.app

      - name: Run production fuel readiness canary
        if: github.event_name != 'pull_request'
        run: npm run check:production-fuel-readiness-canary -- --api-base https://fuel-path.vercel.app

      - name: Run Plan route latency budget
        if: github.event_name != 'pull_request'
        run: npm run check:plan-route-latency-budget

      - name: Upload monitor evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-lookup-monitor
          path: |
            tmp/production-lookup-monitor-*.json
            tmp/geocode-focused-regression-*.json
          if-no-files-found: warn
          retention-days: 30
