name: Production lookup monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: production-lookup-monitor
  cancel-in-progress: false

jobs:
  monitor:
    name: Check production lookup readiness
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production lookup monitor
        run: npm run check:production-lookup-monitor -- --api-base https://fuel-path.vercel.app

      - name: Upload monitor evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-lookup-monitor
          path: |
            tmp/production-lookup-monitor-*.json
            tmp/geocode-focused-regression-*.json
          if-no-files-found: warn
          retention-days: 30
