name: Repository quality

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: repository-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Check architecture and documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout full history for ratcheting baselines
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            mobile-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run architecture guard
        run: npm run check:architecture

      - name: Run backend readiness suite
        run: npm test

      - name: Run documentation guard
        run: |
          npm run check:docs
          npm run test:docs
          npm run measure:doc-context

      - name: Install mobile dependencies
        working-directory: mobile-app
        run: npm ci --cache ../.npm-cache

      - name: Build web app for bundle comparison
        working-directory: mobile-app
        run: npm run build:web

      - name: Reject mobile web bundle regression
        working-directory: mobile-app
        run: npm run budget:web:regression
