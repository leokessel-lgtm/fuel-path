name: Repository quality

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: repository-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Check architecture and documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout full history for ratcheting baselines
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run architecture guard
        run: npm run check:architecture

      - name: Run documentation guard
        run: |
          npm run check:docs
          npm run test:docs
